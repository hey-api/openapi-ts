openapi: 3.0.4
info:
  title: OpenAPI 3.0.4 circular example
  version: 1
components:
  schemas:
    Foo:
      type: object
      properties:
        quux:
          $ref: '#/components/schemas/Quux'
    Bar:
      type: object
      properties:
        bar:
          $ref: '#/components/schemas/Bar'
        baz:
          $ref: '#/components/schemas/Baz'
    Baz:
      type: object
      properties:
        quux:
          $ref: '#/components/schemas/Quux'
    Qux:
      discriminator:
        propertyName: type
        mapping:
          array: '#/components/schemas/Foo'
          struct: '#/components/schemas/Corge'
      oneOf:
        - $ref: '#/components/schemas/Corge'
        - $ref: '#/components/schemas/Foo'
    Quux:
      type: object
      properties:
        qux:
          $ref: '#/components/schemas/Qux'
    Corge:
      type: object
      properties:
        baz:
          type: array
          items:
            $ref: '#/components/schemas/Baz'

    # Self-referencing (A → A)
    TreeNode:
      type: object
      properties:
        id:
          type: string
        value:
          type: string
        children:
          type: array
          items:
            $ref: '#/components/schemas/TreeNode'
      required:
        - id
        - value

    # Mutual reference (A → B → A)
    Org:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        members:
          type: array
          items:
            $ref: '#/components/schemas/Member'
      required:
        - id
        - name

    Member:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        org:
          $ref: '#/components/schemas/Org'
      required:
        - id
        - name

    # Three-way circular reference (A → B → C → A)
    Department:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        employees:
          type: array
          items:
            $ref: '#/components/schemas/Employee'
      required:
        - id
        - name

    Employee:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
      required:
        - id
        - name
        - projects

    Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        department:
          $ref: '#/components/schemas/Department'
      required:
        - id
        - name

    # Non-circular schema referencing a circular schema (feedback #2)
    Wrapper:
      type: object
      properties:
        label:
          type: string
        tree:
          $ref: '#/components/schemas/TreeNode'
      required:
        - label
        - tree

    # Nullable circular reference (required property, nullable type)
    Comment:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        parent:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Comment'
      required:
        - id
        - text
        - parent
