openapi: 3.1.0
info:
  title: opencode
  version: 1.0.0
  description: opencode api
paths:
  /auth/{providerID}:
    put:
      tags:
        - control
      operationId: auth.set
      parameters:
        - name: providerID
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successfully set authentication credentials
          content:
            application/json:
              schema:
                type: boolean
                description: Successfully set authentication credentials
        '400':
          description: BadRequest | InvalidRequestError
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/effect_HttpApiError_BadRequest'
                  - $ref: '#/components/schemas/InvalidRequestError'
      description: Set authentication credentials
      summary: Set auth credentials
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Auth'
      x-codeSamples:
        - lang: js
          source: |-
            import { createOpencodeClient } from "@opencode-ai/sdk

            const client = createOpencodeClient()
            await client.auth.set({
              ...
            })
    delete:
      tags:
        - control
      operationId: auth.remove
      parameters:
        - name: providerID
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successfully removed authentication credentials
          content:
            application/json:
              schema:
                type: boolean
                description: Successfully removed authentication credentials
        '400':
          description: BadRequest | InvalidRequestError
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/effect_HttpApiError_BadRequest'
                  - $ref: '#/components/schemas/InvalidRequestError'
      description: Remove authentication credentials
      summary: Remove auth credentials
      x-codeSamples:
        - lang: js
          source: |-
            import { createOpencodeClient } from "@opencode-ai/sdk

            const client = createOpencodeClient()
            await client.auth.remove({
              ...
            })
  /log:
    post:
      tags:
        - control
      operationId: app.log
      parameters:
        - name: directory
          in: query
          schema:
            type: string
          required: false
        - name: workspace
          in: query
          schema:
            type: string
          required: false
      responses:
        '200':
          description: Log entry written successfully
          content:
            application/json:
              schema:
                type: boolean
                description: Log entry written successfully
        '400':
          description: BadRequest | InvalidRequestError
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/effect_HttpApiError_BadRequest'
                  - $ref: '#/components/schemas/InvalidRequestError'
      description: Write a log entry to the server logs with specified level and metadata.
      summary: Write log
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                service:
                  type: string
                  description: Service name for the log entry
                level:
                  type: string
                  enum:
                    - debug
                    - info
                    - error
                    - warn
                  description: Log level
                message:
                  type: string
                  description: Log message
                extra:
                  type: object
              required:
                - service
                - level
                - message
              additionalProperties: false
      x-codeSamples:
        - lang: js
          source: |-
            import { createOpencodeClient } from "@opencode-ai/sdk

            const client = createOpencodeClient()
            await client.app.log({
              ...
            })
