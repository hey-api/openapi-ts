openapi: 3.1.0
info:
  title: Faker plugin coverage test
  version: '1'
paths:
  /pets:
    get:
      operationId: listPets
      summary: Single useful 2XX (array) → no suffix
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
    post:
      operationId: createPet
      summary: Single useful 2XX after void filter → no suffix
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                tag:
                  type: string
              required:
                - name
      responses:
        '201':
          description: Pet created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '204':
          description: No content
  /pets/{id}:
    get:
      operationId: getPet
      summary: Multiple useful (200 + 404) → suffix
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: A pet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      operationId: updatePet
      summary: Request with body + path + query combined
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: dryRun
          in: query
          required: false
          schema:
            type: boolean
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                tag:
                  $ref: '#/components/schemas/Tag'
              required:
                - name
      responses:
        '200':
          description: Updated pet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
    delete:
      operationId: deletePet
      summary: Single useful non-2XX → suffix
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /jobs:
    post:
      operationId: createJob
      summary: Wildcard 2XX + wildcard error → suffix with wildcard codes
      responses:
        '2XX':
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '4XX':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /health:
    get:
      operationId: healthCheck
      summary: Single useful 2XX (inline string) → no suffix
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
components:
  schemas:
    # --- Primitive types ---
    Price:
      type: number
    Quantity:
      type: integer
    Active:
      type: boolean
    Nothing:
      type: 'null'
    # unknown (empty schema)
    Anything: {}

    # --- Enums ---
    StatusWithNull:
      type:
        - string
        - 'null'
      enum:
        - active
        - inactive
        - null
    NumericEnum:
      type: integer
      enum:
        - 1
        - 2
        - 3

    # --- String formats ---
    Email:
      type: string
      format: email
    DateTime:
      type: string
      format: date-time
    DateOnly:
      type: string
      format: date
    UniqueId:
      type: string
      format: uuid
    Website:
      type: string
      format: uri
    IPv4Address:
      type: string
      format: ipv4
    IPv6Address:
      type: string
      format: ipv6

    # --- String with pattern ---
    ZipCode:
      type: string
      pattern: '^\d{5}(-\d{4})?$'

    # --- String with length constraints ---
    ShortName:
      type: string
      minLength: 2
      maxLength: 50
    MinOnlyString:
      type: string
      minLength: 10
    MaxOnlyString:
      type: string
      maxLength: 5

    # --- Format takes priority over length constraints ---
    EmailWithLength:
      type: string
      format: email
      minLength: 5
      maxLength: 100

    # --- Numeric constraints ---
    BoundedInt:
      type: integer
      minimum: 1
      maximum: 100
    BoundedFloat:
      type: number
      minimum: 0.0
      maximum: 1.0
    ExclusiveInt:
      type: integer
      exclusiveMinimum: 0
      exclusiveMaximum: 10
    MinOnlyNumber:
      type: number
      minimum: 0
    MaxOnlyInt:
      type: integer
      maximum: 999
    ExclusiveFloat:
      type: number
      exclusiveMinimum: 0
      exclusiveMaximum: 1
    ExclusiveFloatNarrow:
      type: number
      exclusiveMinimum: 10.1
      exclusiveMaximum: 10.2

    # --- Array types and constraints ---
    Tags:
      type: array
      items:
        type: string
    TagList:
      type: array
      items:
        type: string
      minItems: 1
      maxItems: 10
    MinOnlyArray:
      type: array
      items:
        type: integer
      minItems: 3
    MaxOnlyArray:
      type: array
      items:
        type: string
      maxItems: 5

    # --- Default values ---
    DefaultString:
      type: string
      default: 'unknown'
    DefaultInt:
      type: integer
      default: 0
    DefaultBool:
      type: boolean
      default: true
    DefaultOverridesConstraints:
      type: integer
      minimum: 1
      maximum: 100
      default: 42

    # --- Nullable types (OpenAPI 3.1 style) ---
    NullableString:
      type:
        - string
        - 'null'
    NullableInt:
      type:
        - integer
        - 'null'

    # --- Objects ---
    ObjectWithDefaultProp:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          default: 'active'
      required:
        - name
    DictionaryObject:
      type: object
      description: This is a dictionary object
      additionalProperties:
        type: string
    UserProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        bio:
          type: string
        age:
          type: integer
      required:
        - id
        - name
    Pet:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        age:
          type: integer
        tag:
          $ref: '#/components/schemas/Tag'
      required:
        - id
        - name
    Tag:
      type: object
      properties:
        id:
          type: integer
        label:
          type: string
      required:
        - id
        - label
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
      required:
        - code
        - message

    # --- Nested $ref ---
    Address:
      type: object
      properties:
        street:
          type: string
          minLength: 1
          maxLength: 200
        zip:
          $ref: '#/components/schemas/ZipCode'
      required:
        - street
        - zip
    Person:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/ShortName'
        email:
          $ref: '#/components/schemas/Email'
        address:
          $ref: '#/components/schemas/Address'
      required:
        - name
        - email
    PersonList:
      type: array
      items:
        $ref: '#/components/schemas/Person'
      minItems: 1
      maxItems: 20
    PetList:
      type: array
      items:
        $ref: '#/components/schemas/Pet'
    Team:
      type: object
      properties:
        lead:
          $ref: '#/components/schemas/Person'
        config:
          $ref: '#/components/schemas/ObjectWithDefaultProp'
      required:
        - lead
        - config

    # --- Unions ---
    PetOrTag:
      oneOf:
        - $ref: '#/components/schemas/Pet'
        - $ref: '#/components/schemas/Tag'
    StringOrNumber:
      anyOf:
        - type: string
        - type: number
    NullablePetOrTag:
      oneOf:
        - $ref: '#/components/schemas/Pet'
        - $ref: '#/components/schemas/Tag'
        - type: 'null'

    # --- allOf intersection ---
    PetWithOwner:
      allOf:
        - $ref: '#/components/schemas/Pet'
        - type: object
          properties:
            owner:
              type: string
          required:
            - owner

    # --- Discriminated oneOf ---
    Circle:
      type: object
      properties:
        kind:
          type: string
        radius:
          type: number
      required:
        - kind
        - radius
    Square:
      type: object
      properties:
        kind:
          type: string
        side:
          type: number
      required:
        - kind
        - side
    Shape:
      oneOf:
        - $ref: '#/components/schemas/Circle'
        - $ref: '#/components/schemas/Square'
      discriminator:
        propertyName: kind

    # --- Discriminated oneOf with explicit mapping ---
    Dog:
      type: object
      properties:
        type:
          type: string
        bark:
          type: boolean
      required:
        - type
        - bark
    Cat:
      type: object
      properties:
        type:
          type: string
        purr:
          type: boolean
      required:
        - type
        - purr
    Animal:
      oneOf:
        - $ref: '#/components/schemas/Dog'
        - $ref: '#/components/schemas/Cat'
      discriminator:
        propertyName: type
        mapping:
          dog: '#/components/schemas/Dog'
          cat: '#/components/schemas/Cat'

    # --- Property name inference ---
    PersonProfile:
      type: object
      properties:
        firstName:
          type: string
        last_name:
          type: string
        email:
          type: string
        phone:
          type: string
        homePhone:
          type: string
        age:
          type: integer
        city:
          type: string
        postalCode:
          type: string
        bio:
          type: string
        # format should take priority over name
        website:
          type: string
          format: uri
        # pattern should take priority over name
        zipCode:
          type: string
          pattern: '^\d{5}$'
        # name inference takes priority over length constraints
        username:
          type: string
          minLength: 3
          maxLength: 20
        # plain string with no matching name — should use fallback
        someRandomField:
          type: string
      required:
        - firstName
        - last_name
        - email
        - phone
        - homePhone
        - age
        - city
        - postalCode
        - bio
        - website
        - zipCode
        - username
        - someRandomField

    # --- Number constraint merging with name defaults ---
    PersonWithConstraints:
      type: object
      properties:
        # name rule provides {min:1, max:120}, schema overrides min
        age:
          type: integer
          minimum: 18
        # name rule provides {min:1, max:120}, schema overrides both
        seniorAge:
          type: integer
          minimum: 65
          maximum: 100
      required:
        - age

    # --- Ancestor-aware inference ---
    User:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
      required:
        - name
        - email
    Company:
      type: object
      properties:
        name:
          type: string
      required:
        - name
    Config:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    # --- Never types (impossible intersections) ---
    # Tuple with never elements — should be skipped entirely
    NeverTuple:
      type: array
      items:
        allOf:
          - type: number
          - type: string
      minItems: 2
      maxItems: 2
    # Array with never items — should produce empty array []
    NeverArray:
      type: array
      items:
        allOf:
          - type: number
          - type: string
    # Object with a required property that is never — should be skipped
    ObjectWithRequiredNever:
      type: object
      properties:
        id:
          type: integer
        impossible:
          allOf:
            - type: number
            - type: string
      required:
        - id
        - impossible
    # Object with an optional property that is never — should still be exported
    ObjectWithOptionalNever:
      type: object
      properties:
        id:
          type: integer
        impossible:
          allOf:
            - type: number
            - type: string
      required:
        - id

    # --- String id → faker.string.uuid() ---
    Document:
      type: object
      properties:
        id:
          type: string
        _id:
          type: string
        # integer id should NOT use uuid — stays as faker.number.int()
        numericId:
          type: integer
      required:
        - id
        - _id
        - numericId
