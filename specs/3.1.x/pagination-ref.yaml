openapi: 3.1.1
info:
  title: OpenAPI 3.1.1 pagination ref example
  version: 1
paths:
  /foo:
    get:
      parameters:
        - in: query
          name: foo
          required: true
          schema:
            $ref: '#/components/schemas/Bar'
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: number
    post:
      requestBody:
        content:
          'application/json':
            schema:
              $ref: '#/components/schemas/Foo'
        required: true
      responses:
        '200':
          description: OK
  /albums:
    get:
      operationId: getAlbums
      parameters:
        - in: query
          name: cursor
          schema:
            anyOf:
              - type: integer
              - type: 'null'
        - in: query
          name: limit
          schema:
            anyOf:
              - type: integer
              - type: 'null'
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                type: array
                items:
                  type: object
  /products:
    get:
      operationId: getProducts
      parameters:
        - in: query
          name: cursor
          schema:
            anyOf:
              - type: string
                format: date-time
              - type: 'null'
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                type: array
                items:
                  type: object
components:
  schemas:
    Foo:
      properties:
        page:
          anyOf:
            - type: integer
              minimum: 1.0
            - type: 'null'
          default: 1
      type: object
    Bar:
      properties:
        page:
          type:
            - integer
            - 'null'
          format: int32
          minimum: 0
        size:
          type:
            - integer
            - 'null'
          format: int32
          minimum: 1
        sort:
          type:
            - array
            - 'null'
          items:
            type: string
      required:
        - page
        - size
        - sort
      type: object
