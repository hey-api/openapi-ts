openapi: 3.1.0
info:
  title: DynamicRef Circular oneOf Test
  description: >
    Tests that hasCircularBinding detects cycles routed through oneOf/anyOf,
    not just direct $ref and single-level allOf. The WrapperNode schema
    references back to the template through oneOf, which the narrow
    hasCircularBinding check would miss.
  version: 0.1.0
servers:
  - url: https://api.example.com
security: []

paths:
  /tree:
    get:
      summary: Get tree nodes
      operationId: getTree
      tags: [Tree]
      responses:
        '200':
          description: Tree nodes with recursive structure through oneOf
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/bound-tree-node'

components:
  schemas:
    TreeNodeTemplate:
      $id: https://example.com/schemas/TreeNodeTemplate
      $defs:
        nodeType:
          $dynamicAnchor: nodeType
          not: {}
      type: object
      required: [id, label, children]
      properties:
        id:
          type: string
        label:
          type: string
        children:
          type: array
          items:
            $dynamicRef: '#nodeType'

    WrapperNode:
      type: object
      oneOf:
        - $ref: '#/components/schemas/bound-tree-node'
        - type: object
          properties:
            leaf:
              type: boolean

    bound-tree-node:
      allOf:
        - $defs:
            nodeType:
              $dynamicAnchor: nodeType
              $ref: '#/components/schemas/WrapperNode'
          $ref: '#/components/schemas/TreeNodeTemplate'
        - type: object
          properties:
            depth:
              type: integer
