name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  issues: write
  packages: write
  pull-requests: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    if: github.repository == 'hey-api/hey-api'
    runs-on: ubuntu-latest
    env:
      CURRENT_BRANCH: ${{ github.ref_name }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_TELEMETRY_DISABLED: 1
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      published-packages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # needs to fetch all commits for changelog
          fetch-tags: true # needs to get the latest tag for changelog

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm tb "@hey-api/**"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.GIT_APP_CLIENT_ID }}
          private-key: ${{ secrets.GIT_APP_PRIVATE_KEY }}

      - name: Create release pull request
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          commit: 'ci: release'
          createGithubReleases: false
          publish: pnpm changeset publish
          title: 'ci: release'
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_CONFIG_PROVENANCE: true

      - name: Generate release tag
        if: steps.changesets.outputs.published == 'true'
        id: tag
        run: echo "tag=$(pnpm -s changelog:release:tag)" >> $GITHUB_OUTPUT

      - name: Get release name
        if: steps.changesets.outputs.published == 'true'
        id: release-name
        run: echo "name=$(pnpm -s changelog:release:name ${{ steps.tag.outputs.tag }})" >> $GITHUB_OUTPUT

      - name: Generate release notes
        if: steps.changesets.outputs.published == 'true'
        id: notes
        run: pnpm -s changelog:release:notes > release-notes.md
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Resolve release commit
        if: steps.changesets.outputs.published == 'true'
        id: release-commit
        run: |
          sha=$(git log --format=%H --grep='^ci: release$' -n 1)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.changesets.outputs.published == 'true'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body_path: release-notes.md
          generate_release_notes: false
          name: ${{ steps.release-name.outputs.name }}
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ steps.release-commit.outputs.sha || github.sha }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Rebuild changelog
        if: steps.changesets.outputs.published == 'true'
        run: pnpm changelog:assemble

      - name: Delete spotlight
        if: steps.changesets.outputs.published == 'true'
        run: rm -f .release/spotlight.md

      - name: Commit changelog
        if: steps.changesets.outputs.published == 'true'
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          branch: ${{ env.CURRENT_BRANCH }}
          commit_message: 'chore: sync changelog [skip ci]'
          file_pattern: CHANGELOG.md

      - name: Update lock file
        if: env.CURRENT_BRANCH == 'changeset-release/main'
        run: pnpm install --lockfile-only

      - name: Commit lock file
        if: env.CURRENT_BRANCH == 'changeset-release/main'
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          branch: ${{ env.CURRENT_BRANCH }}
          commit_message: 'chore: update lock file'

  snapshot:
    name: Snapshot Release
    runs-on: ubuntu-latest
    needs: release
    if: github.repository == 'hey-api/hey-api' && github.ref == 'refs/heads/main'
    env:
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_TELEMETRY_DISABLED: 1
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm tb "@hey-api/**"

      - name: Publish snapshot
        run: |
          pnpm changeset version --snapshot next
          pnpm changeset publish --tag next
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

  publish-pypi:
    name: Publish to PyPI
    needs: release
    if: |
      needs.release.outputs.published == 'true' &&
      contains(needs.release.outputs.published-packages, '"name":"@hey-api/openapi-python"')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hey-api
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: uv sync --frozen --no-dev

      - name: Build openapi-python
        run: pnpm tb "@hey-api/openapi-python"

      - name: Cache Node.js SEA binaries
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/tsdown/node
          key: tsdown-sea-${{ hashFiles('.nvmrc') }}

      - name: Pre-extract Windows Node.js binary
        run: |
          NODE_VERSION=$(cat .nvmrc)
          CACHE_DIR="$HOME/.cache/tsdown/node/v${NODE_VERSION}/win-x64"
          if [ ! -f "$CACHE_DIR/node.exe" ]; then
            mkdir -p "$CACHE_DIR"
            curl -fsSL -o /tmp/node-win.zip \
              "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-win-x64.zip"
            unzip -jo /tmp/node-win.zip "node-v${NODE_VERSION}-win-x64/node.exe" -d "$CACHE_DIR"
            rm /tmp/node-win.zip
          fi

      - name: Build executables
        run: pnpm tb:exe "@hey-api/openapi-python"

      - name: Build wheels
        working-directory: packages/openapi-python/pypi
        run: uv run python build-wheels.py

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: packages/openapi-python/pypi/dist
          skip-existing: true
