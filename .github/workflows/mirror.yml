name: Mirror packages

on:
  push:
    branches:
      - main
    paths:
      - 'packages/openapi-ts/**'
      - 'packages/openapi-python/**'
  workflow_dispatch:

jobs:
  mirror:
    name: Mirror
    if: github.repository == 'hey-api/hey-api'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: openapi-ts
            repo: openapi-typescript
          - package: openapi-python
            repo: openapi-python
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: monorepo

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.GIT_APP_CLIENT_ID }}
          private-key: ${{ secrets.GIT_APP_PRIVATE_KEY }}
          repositories: ${{ matrix.repo }}

      - name: Checkout mirror
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: mirror
          repository: hey-api/${{ matrix.repo }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Sync
        run: monorepo/scripts/mirror-sync.sh ${{ matrix.package }} mirror

      - name: Commit and push
        working-directory: mirror
        env:
          GIT_AUTHOR_NAME: hey-api[bot]
          GIT_AUTHOR_EMAIL: hey-api[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: hey-api[bot]
          GIT_COMMITTER_EMAIL: hey-api[bot]@users.noreply.github.com
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to mirror"
            exit 0
          fi
          git commit -m "ci: sync from hey-api/hey-api@${GITHUB_SHA:0:7}"
          git push
