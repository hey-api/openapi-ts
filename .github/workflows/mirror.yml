name: Mirror packages

on:
  push:
    branches:
      - main
    paths:
      - 'packages/openapi-ts/**'
      - 'packages/openapi-python/**'
  workflow_dispatch:

jobs:
  mirror:
    name: Mirror
    if: github.repository == 'hey-api/hey-api'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: openapi-ts
            repo: openapi-typescript
          - package: openapi-python
            repo: openapi-python
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.GIT_APP_CLIENT_ID }}
          private-key: ${{ secrets.GIT_APP_PRIVATE_KEY }}
          repositories: ${{ matrix.repo }}

      - name: Checkout mirror
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: _mirror
          repository: hey-api/${{ matrix.repo }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Sync
        run: scripts/mirror-sync.sh ${{ matrix.package }} _mirror

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: 'ci: sync from hey-api/hey-api@${{ github.sha }}'
          repository: _mirror
