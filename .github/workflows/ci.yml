name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      node-version: ${{ steps.nvmrc.outputs.node-version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - id: nvmrc
        run: echo "node-version=$(cat .nvmrc)" >> $GITHUB_OUTPUT

  ci:
    name: Build, Lint, Test
    needs: setup
    runs-on: ${{ matrix.os }}
    env:
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_TELEMETRY_DISABLED: 1
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    strategy:
      matrix:
        include:
          # All Node versions on Ubuntu (fast, catches Node issues)
          - os: ubuntu-latest
            node-version: '22.18.0'
          - os: ubuntu-latest
            node-version: '24.14.0'
          - os: ubuntu-latest
            node-version: ${{ needs.setup.outputs.node-version }}
            is-primary: true # Primary runner for examples/previews
          # Latest Node on other OSes (catches platform issues)
          - os: macos-latest
            node-version: ${{ needs.setup.outputs.node-version }}
          - os: windows-latest
            node-version: ${{ needs.setup.outputs.node-version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm tb "@hey-api/**"

      - name: Check examples generated code
        if: matrix.is-primary
        run: pnpm examples:check

      - name: Build examples
        if: matrix.is-primary
        run: pnpm tb "@example/**"

      - name: Run linter
        run: pnpm turbo run lint

      - name: Run type check
        run: pnpm ty "!@test/openapi-ts"

      - name: Run type check (heavy tests)
        run: pnpm ty "@test/openapi-ts"

      - name: Run tests
        run: pnpm test

      - name: Publish preview packages
        if: matrix.is-primary && github.event_name == 'pull_request' && github.repository == 'hey-api/openapi-ts'
        run: ./scripts/publish-preview-packages.sh
        env:
          TURBO_SCM_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
